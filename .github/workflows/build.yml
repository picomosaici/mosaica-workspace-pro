# ===================================================================
# Mosaica Workspace Pro - Build & Release automatico
# ===================================================================
# Si attiva quando:
#  - si pubblica un tag git che inizia con "v" (es. v5.2026.0)
#    -> builda l'installer Windows + crea una GitHub Release
#  - si avvia manualmente dalla pagina "Actions" del repository
#    -> builda solo, senza creare release
# ===================================================================

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build installer Windows
    runs-on: windows-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci

      - name: Build installer Windows (x64)
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Carica artifact (per ogni esecuzione)
        uses: actions/upload-artifact@v4
        with:
          name: MosaicaWorkspacePro-Installer
          path: dist/*.exe
          retention-days: 30

      - name: Crea GitHub Release (solo su tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
          name: "Mosaica Workspace Pro ${{ github.ref_name }}"
          body: |
            ## 🎨 Mosaica Workspace Pro ${{ github.ref_name }}

            Aggiornamento di Giugno 2026 — il builder delle forme "palladiana" fa un salto avanti e lo zoom da rotella diventa ancora più diretto.

            ### ✨ Cosa c'è di nuovo

            - 🧩 **Builder palladiana potenziato** — disegna più forme indipendenti sullo stesso foglio, ognuna con il suo colore e la sua opacità, e salva/riapri l'intera composizione in un file dedicato
            - 📐 **Fogli da A5 ad A0 + Personalizzato** nel builder, con unità in mm / cm / pollici
            - ✨ **Angoli arrotondabili** tutti insieme o vertice per vertice, e **lati curvabili** singolarmente (curve di Bézier) con un semplice trascinamento
            - 🖼️ **Immagine di riferimento** caricabile nel builder per ricalcare una sagoma, con la griglia che adatta da sola il proprio colore per restare leggibile

            ### 🛠️ Miglioramenti

            - 🖱️ **Zoom da rotella senza inerzia** — risponde tacca per tacca, senza più scivolare dopo l'ultimo scatto: più diretto e prevedibile
            - ⚡ **Resa nitida più pronta** dopo lo zoom: l'immagine ad alta definizione torna subito a fine gesto

            ### 📥 Installazione

            1. Scarica il file `MosaicaWorkspacePro-Setup-06.2026.exe` qui sotto
            2. Eseguilo (se Windows mostra *"Editore sconosciuto"*, clicca **Ulteriori informazioni → Esegui comunque**)
            3. Segui l'installer — puoi scegliere la lingua all'avvio

            > 💡 Le tue tavole salvate, le calibrazioni e le preferenze vengono **conservate** durante l'aggiornamento.

            ### 📝 Note tecniche

            - Versione interna: `6.2026.1`
            - Electron 41 · Fabric.js 5.1.0 → 5.3.0 (minima 5.1.0, massima testata 5.3.0)
            - 589 chiavi i18n simmetriche IT + EN
            - Progetti palladiana salvati in file `.mspp.json` (coordinate in mm reali)