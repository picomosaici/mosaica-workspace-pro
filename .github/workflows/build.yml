# ===================================================================
# Mosaica Workspace Pro - Build & Release automatico
# ===================================================================
# Si attiva quando:
#  - si pubblica un tag git che inizia con "v" (es. v5.2026.0)
#    -> builda l'installer Windows + crea una GitHub Release
#  - si avvia manualmente dalla pagina "Actions" del repository
#    -> builda solo, senza creare release
# ===================================================================

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build installer Windows
    runs-on: windows-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci

      - name: Build installer Windows (x64)
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Carica artifact (per ogni esecuzione)
        uses: actions/upload-artifact@v4
        with:
          name: MosaicaWorkspacePro-Installer
          path: dist/*.exe
          retention-days: 30

      - name: Crea GitHub Release (solo su tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
          name: "Mosaica Workspace Pro ${{ github.ref_name }}"
          body: |
            ## 🎨 Mosaica Workspace Pro ${{ github.ref_name }}

            Versione **06.2026** — Mosaica diventa multilingue, lo zoom vola, e mouse e tastiera sono finalmente tuoi.

            ### ✨ Cosa c'è di nuovo

            - 🌍 **Interfaccia in Italiano e Inglese** — cambia lingua dal menu *File*, l'app si riavvia e si traduce tutto, guida utente compresa
            - 🔍 **Zoom Photoshop-style** — la rotella ora è fluida anche su progetti pesanti (centinaia di tessere, sfondi grandi, decine di tratti acquerello). Niente più scatti o blocchi a metà gesto
            - 🖱️ **Mappa mouse e tastiera come vuoi tu** — dal pulsante *Input* nella barra superiore puoi assegnare azioni a:
              - Tasti singoli del mouse (compresi i laterali X1/X2 di mouse gaming e HP)
              - Combinazioni di tasti mouse (es. sinistro + destro)
              - Scorciatoie di tastiera personalizzate (es. Ctrl+L)
              - Tasti come frecce direzionali (es. W/A/S/D)
            - 🎁 **Installer multilingua** con selettore di lingua all'avvio e pannello dettagli tradotto

            ### 🛡️ Cosa NON è cambiato (apposta)

            - Le scorciatoie classiche (Ctrl+Z, Ctrl+C/V/X, Canc, Ctrl+/-, frecce) restano attive come sempre
            - La rotazione fine col tasto destro sulle forme funziona ancora
            - In modalità disegno (Penna/Acquerello/Gomma) il tasto sinistro disegna sempre, anche se l'hai mappato a qualcos'altro

            ### 📥 Installazione

            1. Scarica il file `MosaicaWorkspacePro-Setup-06.2026.exe` qui sotto
            2. Eseguilo (se Windows mostra *"Editore sconosciuto"*, clicca **Ulteriori informazioni → Esegui comunque**)
            3. Segui l'installer — puoi scegliere la lingua all'avvio

            > 💡 Le tue tavole salvate, le calibrazioni e le preferenze vengono **conservate** durante l'aggiornamento.

            ### 📝 Note tecniche

            - Versione interna: `6.2026.0`
            - Electron 41 · Fabric.js 7.x (compatibilità garantita da 5.1.0)
            - 443 chiavi i18n simmetriche IT + EN
            - Snapshot GPU cappato a 4096px lato lungo per non gonfiare la RAM