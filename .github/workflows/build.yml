# ===================================================================
# Mosaica Workspace Pro - Build & Release automatico
# ===================================================================
# Si attiva quando:
#  - si pubblica un tag git che inizia con "v" (es. v5.2026.0)
#    -> builda l'installer Windows + crea una GitHub Release
#  - si avvia manualmente dalla pagina "Actions" del repository
#    -> builda solo, senza creare release
# ===================================================================

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build installer Windows
    runs-on: windows-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci --omit=optional

      - name: Build installer Windows (x64)
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Carica artifact (per ogni esecuzione)
        uses: actions/upload-artifact@v4
        with:
          name: MosaicaWorkspacePro-Installer
          path: dist/*.exe
          retention-days: 30

      - name: Crea GitHub Release (solo su tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
          name: "Mosaica Workspace Pro ${{ github.ref_name }}"
          body: |
            ## 🎨 Mosaica Workspace Pro ${{ github.ref_name }}

            Aggiornamento correttivo: etichetta del pennello selezione.

            ### 🛠️ Correzioni

            - 🖌️ **Pennello selezione** — il messaggio che compare attivando lo strumento ora indica correttamente **CTRL** per deselezionare (prima diceva *ALT*). Nessun cambiamento di comportamento: la deselezione è sempre stata su CTRL, e la guida utente era già corretta

            ### 📥 Installazione

            1. Scarica il file `MosaicaWorkspacePro-Setup-07.2026.exe` qui sotto
            2. Eseguilo (se Windows mostra *"Editore sconosciuto"*, clicca **Ulteriori informazioni → Esegui comunque**)
            3. Segui l'installer — puoi scegliere la lingua all'avvio

            > 💡 Tavole salvate, calibrazioni e preferenze vengono **conservate** durante l'aggiornamento.

            ### 📝 Note tecniche

            - Versione interna: `7.2026.3`
            - Electron 41 · Fabric.js 5.1.0 → 5.3.0 (invariati rispetto a 07.2026)