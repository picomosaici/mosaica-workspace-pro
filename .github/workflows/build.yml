# ===================================================================
# Mosaica Workspace Pro - Build & Release automatico
# ===================================================================
# Si attiva quando:
#  - si pubblica un tag git che inizia con "v" (es. v5.2026.0)
#    -> builda l'installer Windows + crea una GitHub Release
#  - si avvia manualmente dalla pagina "Actions" del repository
#    -> builda solo, senza creare release
# ===================================================================

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build installer Windows
    runs-on: windows-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci --omit=optional

      - name: Build installer Windows (x64)
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Carica artifact (per ogni esecuzione)
        uses: actions/upload-artifact@v4
        with:
          name: MosaicaWorkspacePro-Installer
          path: dist/*.exe
          retention-days: 30

      - name: Crea GitHub Release (solo su tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
          name: "Mosaica Workspace Pro ${{ github.ref_name }}"
          body: |
            ## 🎨 Mosaica Workspace Pro ${{ github.ref_name }}

            Aggiornamento di Luglio 2026 — due nuovi strumenti di selezione e disegno, più un menu radiale che ora lavora su più forme insieme.

            ### ✨ Cosa c'è di nuovo

            - 🖌️ **Pennello selezione** — seleziona le tessere dipingendoci sopra a mano libera, come con un pennello; le passate si sommano e tenendo premuto **CTRL** (⌘ su Mac) deselezioni invece di aggiungere. Diametro della punta regolabile in mm reali (tasto destro sull'icona)
            - ⬡ **Perimetro di contenimento** — traccia un poligono chiuso entro cui far valere pennello e acquerello: ideale per restare dentro le fughe. Si salva con il progetto e resta valido anche dopo averlo rimosso

            ### 🛠️ Miglioramenti

            - 🎯 **Menu radiale in selezione multipla** — seleziona più forme con **CTRL + click** e applica colore, texture, blocco o eliminazione a tutte insieme, oltre a raggruppa / separa
            - 📖 **Guida utente aggiornata** (IT + EN) con i nuovi strumenti e la correzione della selezione multipla

            ### 📥 Installazione

            1. Scarica il file `MosaicaWorkspacePro-Setup-07.2026.exe` qui sotto
            2. Eseguilo (se Windows mostra *"Editore sconosciuto"*, clicca **Ulteriori informazioni → Esegui comunque**)
            3. Segui l'installer — puoi scegliere la lingua all'avvio

            > 💡 Le tue tavole salvate, le calibrazioni e le preferenze vengono **conservate** durante l'aggiornamento.

            ### 📝 Note tecniche

            - Versione interna: `7.2026.0`
            - Electron 41 · Fabric.js 5.1.0 → 5.3.0 (minima 5.1.0, massima testata 5.3.0)