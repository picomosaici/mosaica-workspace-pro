# ===================================================================
# Mosaica Workspace Pro - Build & Release automatico
# ===================================================================
# Si attiva quando:
#  - si pubblica un tag git che inizia con "v" (es. v5.2026.0)
#    -> builda l'installer Windows + crea una GitHub Release
#  - si avvia manualmente dalla pagina "Actions" del repository
#    -> builda solo, senza creare release
# ===================================================================

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build installer Windows
    runs-on: windows-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci --omit=optional

      - name: Build installer Windows (x64)
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Carica artifact (per ogni esecuzione)
        uses: actions/upload-artifact@v4
        with:
          name: MosaicaWorkspacePro-Installer
          path: dist/*.exe
          retention-days: 30

      - name: Crea GitHub Release (solo su tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
          name: "Mosaica Workspace Pro ${{ github.ref_name }}"
          body: |
            ## 🎨 Mosaica Workspace Pro ${{ github.ref_name }}

            Aggiornamento di rifinitura — il pan diventa più fluido e gli slider di geometria più maneggevoli.

            ### 🛠️ Miglioramenti

            - 🖱️ **Pan più fluido** (Alt + trascina): i movimenti vengono raccolti e applicati una volta per frame, niente più ricalcoli in eccesso sui monitor ad alta frequenza — resta morbido anche con tavole molto cariche
            - 🎯 **Alt + trascina = pan "puro"**: la selezione attiva resta intatta e nessuna forma viene agganciata o spostata per sbaglio
            - 📐 **Slider del trapezio più maneggevoli**: il massimo si ri-arma a ogni rilascio (valore corrente + 10 mm), così ingrandisci a piccoli passi senza tetto fisso e senza che il cursore "salti indietro"
            - ↩️ **Storico più pulito**: una sola voce Annulla/Ripristina a fine regolazione, non più una per ogni micro-spostamento dello slider
            - 🎛️ **Slider menu radiale**: regolazione 0…+30%, doppio click per azzerare

            ### 📥 Installazione

            1. Scarica il file `MosaicaWorkspacePro-Setup-06.2026.exe` qui sotto
            2. Eseguilo (se Windows mostra *"Editore sconosciuto"*, clicca **Ulteriori informazioni → Esegui comunque**)
            3. Segui l'installer — puoi scegliere la lingua all'avvio

            > 💡 Le tue tavole salvate, le calibrazioni e le preferenze vengono **conservate** durante l'aggiornamento.

            ### 📝 Note tecniche

            - Versione interna: `6.2026.2`
            - Electron 41 · Fabric.js 5.1.0 → 5.3.0 (minima 5.1.0, massima testata 5.3.0)
            - Pan con batching su requestAnimationFrame (un applyTransform per frame; render forme rientrate throttle ~90 ms; render finale a fine gesto)
            - 589 chiavi i18n simmetriche IT + EN