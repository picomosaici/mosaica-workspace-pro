# ===================================================================
# Mosaica Workspace Pro - Build & Release automatico
# ===================================================================
# Si attiva quando:
#  - si pubblica un tag git che inizia con "v" (es. v5.2026.0)
#    -> builda l'installer Windows + crea una GitHub Release
#  - si avvia manualmente dalla pagina "Actions" del repository
#    -> builda solo, senza creare release
# ===================================================================

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build installer Windows
    runs-on: windows-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Installa dipendenze
        run: npm ci --omit=optional

      - name: Build installer Windows (x64)
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Carica artifact (per ogni esecuzione)
        uses: actions/upload-artifact@v4
        with:
          name: MosaicaWorkspacePro-Installer
          path: dist/*.exe
          retention-days: 30

      - name: Crea GitHub Release (solo su tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
          name: "Mosaica Workspace Pro ${{ github.ref_name }}"
          body: |
            ## 🎨 Mosaica Workspace Pro ${{ github.ref_name }}

            Aggiornamento correttivo: il cerchio di riferimento del tratto ora combacia con il segno reale.

            ### 🛠️ Correzioni

            - 🎯 **Cerchio di riferimento più fedele** — per la **penna** e il **pennello acquerello** il cerchio che mostra lo spessore ora corrisponde 1:1 al tratto reale. Prima appariva più largo del segno (seguiva l'alone sfumato dell'acquerello e, passandoci sopra senza disegnare, la pressione massima della penna)
              - In *hover* mostra la larghezza impostata sugli slider
              - Durante il tratto con tavoletta **Wacom** segue dal vivo la pressione, come il pennello vero

            ### 🧹 Manutenzione

            - Aggiornate alcune dipendenze degli strumenti di build (correzioni di sicurezza, nessun impatto sull'uso dell'app)

            ### 📥 Installazione

            1. Scarica il file `MosaicaWorkspacePro-Setup-07.2026.exe` qui sotto
            2. Eseguilo (se Windows mostra *"Editore sconosciuto"*, clicca **Ulteriori informazioni → Esegui comunque**)
            3. Segui l'installer — puoi scegliere la lingua all'avvio

            > 💡 Tavole salvate, calibrazioni e preferenze vengono **conservate** durante l'aggiornamento.

            ### 📝 Note tecniche

            - Versione interna: `7.2026.1`
            - Electron 41 · Fabric.js 5.1.0 → 5.3.0 (invariati rispetto a 07.2026)